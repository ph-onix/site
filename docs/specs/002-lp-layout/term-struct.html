<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terminal — raw structure</title>
</head>
<body>

  <div class="term">

      <hr>
    </div>

    <!-- append-only command history -->
    <ol role="log" aria-label="Terminal history">

      <li>
        <span><span>$ ./stats.sh</span><span class="caret" aria-hidden="true"></span></span>
        <div>
          <span>5 active projects · last change 2d ago</span>
        </div>
      </li>

      <li>
        <span><span>$ git log --oneline -3</span><span class="caret" aria-hidden="true"></span></span>
        <div>
          <span><span>a1b2c3</span> feat: add auth middleware</span>
          <span><span>d4e5f6</span> fix: query timeout on large sets</span>
          <span><span>g7h8i9</span> docs: update API spec</span>
        </div>
      </li>

    </ol>

    <!-- open transaction — live prompt -->
    <div>
      <span aria-hidden="true"><span>$&nbsp;</span><span class="caret"></span></span>
      <label for="cmd-input">Terminal command</label>
      <input id="cmd-input" type="text" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off" disabled/>
    </div>

  </div>

</body>
</html>
