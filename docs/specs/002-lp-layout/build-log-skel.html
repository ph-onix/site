<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Build log — skeleton</title>
</head>
<body>

  <!-- shared icon defs — the static heading column keeps its real chevron -->
  <svg style="display:none">
    <defs>
      <symbol id="ico-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"/>
      </symbol>
    </defs>
  </svg>

  <section class="bl" aria-busy="true">

    <!-- left: heading column — static content, known at build time -->
    <div>
      <h2>Build log</h2>
      <p>Dated notes on what I'm building and why — decisions, write-ups, and the calls I've had to walk back. The thinking behind the projects, in the open.</p>
      <a href="#">
        See the full log
        <svg aria-hidden="true"><use href="#ico-chevron"/></svg>
      </a>
    </div>

    <!-- pre-hydration placeholder — swapped for .bl > ol once entries hydrate -->
    <ol class="bl-skel" aria-hidden="true">

      <!-- row: date · project (scramble cells) · message -->
      <li>
        <div>
          <span></span>
          <span><span></span><span></span><span></span><span></span><span></span></span>
          <span></span>
        </div>
      </li>

      <li>
        <div>
          <span></span>
          <span><span></span><span></span><span></span><span></span><span></span></span>
          <span></span>
        </div>
      </li>

      <li>
        <div>
          <span></span>
          <span><span></span><span></span><span></span><span></span><span></span></span>
          <span></span>
        </div>
      </li>

      <li>
        <div>
          <span></span>
          <span><span></span><span></span><span></span><span></span><span></span></span>
          <span></span>
        </div>
      </li>

      <li>
        <div>
          <span></span>
          <span><span></span><span></span><span></span><span></span><span></span></span>
          <span></span>
        </div>
      </li>

    </ol>

  </section>

</body>
</html>
