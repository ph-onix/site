      <!-- row 1 — span-6 (fully featured) -->

          <!-- head: icon · title · activity chip -->

          <!-- progression band -->
          <dl>

            </div>
          </dl>

        </a>
      </li>

      <!-- row 2 — span-4 × 3 -->

        <a class="col-span-4" href="#">
          <div>
            <svg viewBox="0 0 24 24"></svg>

            <span>last change 2d ago</span>
          </div>
          <p>Description.</p>
        </a>
      </li>

    </ul>
    </div>
